  <style>
    /* ===== SP SDSダウンロード申請（送信完了） (400px幅) ===== */

    body {
      width: 400px;
      margin: 0;
    }

    /* ---- enative365R SP ヘッダー ---- */
    .enative-header {
      width: 400px; height: 56px; background: #000;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 16px; box-sizing: border-box; position: relative;
    }
    .enative-header__logo img { height: 16px; display: block; }
    .enative-hamburger { display: flex; flex-direction: column; gap: 5px; cursor: pointer; padding: 8px; }
    .enative-hamburger span { display: block; width: 22px; height: 2px; background: #fff; }
    .enative-drawer {
      display: none; position: fixed; top: 0; left: 0;
      width: 400px; height: 100%; background: #000;
      z-index: 100; padding: 56px 0 0; box-sizing: border-box;
    }
    .enative-drawer.is-open { display: block; }
    .enative-drawer-nav { display: flex; flex-direction: column; }
    .enative-drawer-nav__item {
      font-size: 13px; color: #fff; text-decoration: none;
      letter-spacing: 0.26px; line-height: 24px;
      padding: 16px 24px; border-bottom: 1px solid #333;
    }
    .enative-drawer-nav__btn {
      font-size: 12px; color: #fff; text-decoration: none;
      letter-spacing: 0.24px; line-height: 24px;
      padding: 16px 24px; border: 1px solid #fff;
      margin: 24px; text-align: center; display: block;
    }

    /* === Inner override === */
    .inner {
      width: 352px !important;
      margin: 0 auto !important;
      padding: 0 !important;
      box-sizing: border-box;
    }

    /* === Page BG === */
    .page-bg {
      padding-top: 0;
      padding-bottom: 48px;
    }

    .breadcrumb {
      margin-top: 8px;
    }

    .page-title {
      border-bottom: none;
      padding-bottom: 0;
      margin-bottom: 0;
      margin-top: 16px;
    }

    /* === Success content area === */
    .success-wrap {
      width: 352px;
      margin: 0 auto;
      padding-top: 40px;
      padding-bottom: 48px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* === Check icon === */
    .check-icon {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 2px solid #555;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      color: #555;
      margin-bottom: 16px;
      flex-shrink: 0;
    }

    /* === Success message === */
    .success-msg {
      font-size: 12px;
      color: #333;
      line-height: 22.2px;
      text-align: center;
      margin-bottom: 32px;
    }

    /* === Download button === */
    .btn-download {
      display: flex;
      width: 352px;
      height: 44px;
      background: #333;
      border: 1px solid #333;
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      font-family: 'Helvetica Neue', sans-serif;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      margin-bottom: 12px;
    }

    /* === Mail notice === */
    .mail-notice {
      font-size: 11px;
      color: #888;
      text-align: center;
      line-height: 17.6px;
      margin-bottom: 20px;
    }

    /* === TOPに戻る button === */
    .btn-back-top {
      display: flex;
      width: 200px;
      height: 40px;
      background: #fff;
      border: 1px solid #aaa;
      color: #333;
      font-size: 12px;
      font-family: 'Helvetica Neue', sans-serif;
      align-items: center;
      justify-content: center;
      text-decoration: none;
    }

    /* === Footer === */
    .site-footer {
      width: 400px;
      background: #e8e8e8;
      padding: 20px 24px;
      box-sizing: border-box;
      height: auto;
    }
    .site-footer p {
      font-size: 12px;
      color: #555;
      margin-left: 0;
    }

  <script>
