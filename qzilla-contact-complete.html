<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>PC お問い合わせ（送信完了） — 鈴木刃物工業オリジナルオイルサイト</title>
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
  <link rel="stylesheet" href="base.css">
  <style>
    .qzilla-header {
      width: 1440px;
      height: 80px;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      box-sizing: border-box;
    }
    .qzilla-header__logo img {
      height: 32px;
      display: block;
    }
    .qzilla-nav {
      display: flex;
      align-items: center;
      gap: 0;
    }
    .qzilla-nav__item {
      font-size: 12px;
      color: #fff;
      text-decoration: none;
      letter-spacing: 0.24px;
      line-height: 32px;
      padding: 0 16px;
      white-space: nowrap;
    }
    .qzilla-nav__item:first-child {
      padding-left: 0;
    }
    .qzilla-nav__btn {
      font-size: 11px;
      color: #fff;
      text-decoration: none;
      letter-spacing: 0.22px;
      line-height: 30px;
      padding: 0 15px;
      border: 1px solid #fff;
      margin-left: 16px;
      white-space: nowrap;
    }
    .qzilla-nav__dropdown {
      position: relative;
      display: flex;
      align-items: center;
      padding: 0 0 0 8px;
    }
    .qzilla-nav__dropdown:hover .qzilla-nav__submenu {
      display: block;
    }
    .qzilla-nav__submenu {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      background: #000;
      min-width: 120px;
      z-index: 10;
    }
    .qzilla-nav__submenu a {
      display: block;
      font-size: 12px;
      color: #fff;
      text-decoration: none;
      padding: 10px 16px;
      letter-spacing: 0.24px;
      white-space: nowrap;
      border-top: 1px solid #333;
    }
    .qzilla-nav__submenu a:hover {
      background: #222;
    }
    .inner {
      margin-left: auto;
      margin-right: auto;
    }
    .page-bg {
      padding-top: 0;
      padding-bottom: 56px;
    }
    .breadcrumb {
      margin-top: 8px;
    }
    .page-title {
      border-bottom: none;
      padding-bottom: 0;
      margin-bottom: 0;
      margin-top: 20px;
    }

    /* ---- Success content area ---- */
    .success-wrap {
      width: 400px;
      margin: 0 auto;
      padding-top: 48px;
      padding-bottom: 60px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ---- Check icon ---- */
    .check-icon {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 2px solid #555;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      color: #555;
      margin-bottom: 16px;
      flex-shrink: 0;
    }

    /* ---- Success message ---- */
    .success-msg {
      font-size: 12px;
      color: #333;
      line-height: 22.2px;
      text-align: center;
      margin-bottom: 32px;
    }

    /* ---- Mail notice ---- */
    .mail-notice {
      font-size: 11px;
      color: #888;
      text-align: center;
      line-height: 17.6px;
      margin-bottom: 20px;
    }

    /* ---- TOPに戻る button ---- */
    .btn-back-top {
      display: flex;
      width: 200px;
      height: 40px;
      background: #fff;
      border: 1px solid #aaa;
      color: #333;
      font-size: 12px;
      font-family: 'Helvetica Neue', sans-serif;
      align-items: center;
      justify-content: center;
      text-decoration: none;
    }
  </style>
  <script src="auth.js"></script>
</head>
<body>

  <!-- Header -->
  <header class="qzilla-header">
    <a href="qzilla.html" class="qzilla-header__logo">
      <img src="images/qzilla.png" alt="QZILLA">
    </a>
    <nav class="qzilla-nav">
      <a href="qzilla.html" class="qzilla-nav__item">TOP</a>
      <a href="qzilla-about.html" class="qzilla-nav__item">ABOUT</a>
      <a href="qzilla-oil.html" class="qzilla-nav__item">原液</a>
      <a href="qzilla-spray.html" class="qzilla-nav__item">スプレー</a>
      <div class="qzilla-nav__dropdown">
        <a href="#" class="qzilla-nav__item">導入事例 ▾</a>
        <div class="qzilla-nav__submenu">
          <a href="qzilla-cases-processing.html">加工</a>
          <a href="qzilla-cases-maintenance.html">保全</a>
        </div>
      </div>
      <a href="qzilla-news.html" class="qzilla-nav__item">ニュース</a>
      <a href="qzilla-contact.html" class="qzilla-nav__item">お問い合わせ</a>
      <a href="qzilla-sds.html" class="qzilla-nav__item">SDSダウンロード</a>
      <a href="#" class="qzilla-nav__btn">ONLINE SHOP</a>
    </nav>
  </header>

  <!-- Page content -->
  <div class="page-bg">
    <div class="inner">

      <!-- Breadcrumb -->
      <div class="breadcrumb">
        TOP &gt; <span>お問い合わせ</span>
      </div>

      <!-- Page title -->
      <h1 class="page-title">お問い合わせ</h1>

      <!-- Success content -->
      <div class="success-wrap">

        <!-- Check icon -->
        <div class="check-icon">✓</div>

        <!-- Message -->
        <p class="success-msg">
          お問い合わせを受け付けました。<br>
          内容を確認のうえ、担当者よりご連絡いたします。<br>
          ご入力のメールアドレスに受付確認メールをお送りしました。
        </p>

        <!-- Mail notice -->
        <p class="mail-notice">メールが届かない場合は迷惑メールフォルダをご確認ください。</p>

        <!-- Back to TOP -->
        <a href="qzilla.html" class="btn-back-top">TOPに戻る</a>

      </div>

    </div><!-- /inner -->
  </div><!-- /page-bg -->

  <!-- Footer -->
  <footer class="site-footer">
    <nav class="site-footer__nav">
      <a href="#">プライバシーポリシー</a>
      <a href="#">ECサイト</a>
      <a href="#">運営会社</a>
    </nav>
  </footer>

</body>
</html>
